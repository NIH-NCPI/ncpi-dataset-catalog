[project]
name = "ncpi-concept-search"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "duckdb",
    "fastapi",
    "httpx",
    "pydantic-ai-slim[anthropic]",
    "pydantic-evals",
    "python-dotenv",
    "uvicorn[standard]",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[project.scripts]
concept-search = "concept_search.cli:main"
concept-search-api = "concept_search.api:main"
